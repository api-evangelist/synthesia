apis:
  - aid: synthesia:synthesia-api
    name: Synthesia API
    description: >-
      The Synthesia REST API enables programmatic creation of avatar videos
      from scripts and templates, with endpoints for videos, templates,
      avatars, voices, assets, dubbing projects, translations, audit logs,
      and webhooks. It is designed for high-volume, personalized, and
      multilingual video production workflows.
    humanURL: https://docs.synthesia.io/
    baseURL: https://api.synthesia.io/v2
    tags:
      - Video
      - Avatars
      - Templates
      - Dubbing
      - Translation
      - Webhooks
    properties:
      - type: Documentation
        url: https://docs.synthesia.io/
      - type: GettingStarted
        url: https://docs.synthesia.io/docs/getting-started
      - type: Signup
        url: https://www.synthesia.io/signup
      - type: API
        url: https://docs.synthesia.io/reference
      - type: OpenAPI
        url: https://docs.synthesia.io/llms.txt
      - type: Pricing
        url: https://www.synthesia.io/pricing
      - type: Authentication
        url: https://docs.synthesia.io/reference/authentication
    features:
      - name: Video Creation
        description: >-
          Generate avatar videos from scripts with configurable backgrounds,
          layouts, and avatars.
      - name: Templates
        description: >-
          Create reusable templates and produce videos by passing variables
          into them.
      - name: Avatar Library
        description: >-
          Access a library of stock avatars (and custom avatars on enterprise
          plans) via stable IDs.
      - name: Voice Library
        description: >-
          Select from supported voices across 140+ languages and locales.
      - name: Dubbing
        description: >-
          Create dubbing projects, add locales, and check status for
          multi-language video output.
      - name: Translation and XLIFF
        description: >-
          Translate scripts and templates with XLIFF-based localization
          workflows.
      - name: Asset Management
        description: >-
          Upload and manage media assets used inside generated videos.
      - name: Webhooks
        description: >-
          Subscribe to events such as video.completed to drive downstream
          workflows.
      - name: Audit Logs
        description: >-
          Query and export audit logs as CSV for compliance and governance.
    useCases:
      - name: Corporate Training
        description: >-
          Produce and update learning and development videos at scale
          without re-shoots.
      - name: Personalized Sales Outreach
        description: >-
          Generate personalized prospect videos with dynamic variables.
      - name: Multilingual Localization
        description: >-
          Dub and translate existing video content into dozens of languages.
      - name: Product Marketing
        description: >-
          Spin up product update and announcement videos from templates.
      - name: Customer Support
        description: >-
          Auto-generate explainer and how-to videos for help centers.
    integrations:
      - name: Zapier
      - name: Make
      - name: Microsoft PowerPoint
      - name: Articulate Storyline
      - name: SCORM
      - name: LMS Platforms
      - name: Slack
      - name: Webhooks
    authentication:
      - type: API Key
        description: >-
          API keys are issued from the Synthesia dashboard and passed in the
          Authorization header on each request.
