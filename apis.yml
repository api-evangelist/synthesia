aid: synthesia
name: Synthesia
description: >-
  Synthesia is the leading enterprise AI video platform for creating
  studio-quality videos from text using lifelike AI avatars and voices.
  Customers use Synthesia to produce training, learning and development,
  customer onboarding, marketing, and internal communications videos in
  140+ languages without cameras, actors, or studios. The company sells
  tiered SaaS plans (Basic, Starter, Creator, Enterprise) with API access
  starting at the Creator tier and full programmatic capabilities for
  enterprise customers. The Synthesia API lets teams generate, translate,
  and dub videos at scale and embed video generation into their own
  applications.
